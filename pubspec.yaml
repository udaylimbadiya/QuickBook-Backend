name: quickbook
description: Premium Smart Booking App
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  glassmorphism: ^3.0.0
  animations: ^2.0.11
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # State Management
  provider: ^6.1.2

  # API
  http: ^1.2.1
  dio: ^5.4.3+1

  # Calendar & Date
  table_calendar: ^3.1.2
  intl: ^0.19.0

  # Storage
  shared_preferences: ^2.2.3

  # Utilities
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.0

  # Maps
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Animations
  animate_do: ^3.3.4


  # Local Fonts (Optional)
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/